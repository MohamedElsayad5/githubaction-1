name: Build and Push Docker Image  #workflow name , can be anything you want

on:
  push:  #trigger the workflow when there is a push to the main branch.listen to the push event on the main branch
    branches: [main] #specify the branch to listen to for push events
  pull_request:  #trigger the workflow when there is a pull request to the main branch
    branches: [main]

jobs: #define the jobs that will run as part of this workflow
  build-and-push: #job name, can be anything you want 
    runs-on: ubuntu-latest #specify the operating system for the job to run on

    steps:  #define the steps that will be executed as part of this job
      - name: Checkout code  #step name, can be anything you want
        uses: actions/checkout@v4 #use the checkout action to check out the code from the repository

      - name: Log in to Docker Hub #step name, can be anything you want
        uses: docker/login-action@v3  #use the docker login action to log in to Docker Hub using the provided credentials
        with:  #specify the username and password for Docker Hub using secrets stored in the repository
          username: ${{ secrets.DOCKERHUB_USERNAME }} #use the DOCKERHUB_USERNAME secret for the username
          password: ${{ secrets.DOCKERHUB_TOKEN }} #use the DOCKERHUB_TOKEN secret for the password

      - name: Build and push Docker image #step name, can be anything you want
        env: #define environment variables for the step
          REPOSITORY: nginx #specify the name of the Docker repository to push to
          IMAGE_TAG: latest #specify the tag for the Docker image, in this case, we are using "latest"
        run: | #run the commands to build and push the Docker image
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY:$IMAGE_TAG .  #build the Docker image using the Dockerfile in the current directory and tag it with the specified repository and image tag
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY:$IMAGE_TAG  #push the Docker image to the specified repository on Docker Hub
